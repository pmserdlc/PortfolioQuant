<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1e3a"/>
      <stop offset="100%" stop-color="#071a12"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="areaGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fondo redondeado -->
  <rect width="400" height="400" rx="90" fill="url(#iconBg)" stroke="rgba(59,130,246,0.45)" stroke-width="5"/>

  <!-- Resplandor de fondo central -->
  <ellipse cx="200" cy="200" rx="180" ry="130"
    fill="radial-gradient(ellipse, rgba(59,130,246,0.08) 0%, transparent 70%)"
    opacity="0.4"/>

  <!-- Grid interior sutil -->
  <line x1="60"  y1="80"  x2="60"  y2="318" stroke="rgba(255,255,255,0.04)" stroke-width="1.5"/>
  <line x1="130" y1="80"  x2="130" y2="318" stroke="rgba(255,255,255,0.04)" stroke-width="1.5"/>
  <line x1="200" y1="80"  x2="200" y2="318" stroke="rgba(255,255,255,0.04)" stroke-width="1.5"/>
  <line x1="270" y1="80"  x2="270" y2="318" stroke="rgba(255,255,255,0.04)" stroke-width="1.5"/>
  <line x1="340" y1="80"  x2="340" y2="318" stroke="rgba(255,255,255,0.04)" stroke-width="1.5"/>
  <line x1="50"  y1="140" x2="350" y2="140" stroke="rgba(255,255,255,0.04)" stroke-width="1.5"/>
  <line x1="50"  y1="200" x2="350" y2="200" stroke="rgba(255,255,255,0.04)" stroke-width="1.5"/>
  <line x1="50"  y1="260" x2="350" y2="260" stroke="rgba(255,255,255,0.04)" stroke-width="1.5"/>
  <line x1="50"  y1="318" x2="350" y2="318" stroke="rgba(255,255,255,0.07)" stroke-width="1.5"/>

  <!-- Área bajo la curva -->
  <path d="M 52 318 Q 100 295 155 265 Q 210 232 265 185 Q 300 155 346 92 L 346 318 Z"
    fill="url(#areaGrad)"/>

  <!-- Frontera eficiente — curva principal -->
  <path d="M 52 318 Q 100 295 155 265 Q 210 232 265 185 Q 300 155 346 92"
    stroke="url(#iconGrad)" stroke-width="10" stroke-linecap="round" fill="none"
    filter="url(#glow)"/>

  <!-- Puntos de cartera -->
  <circle cx="52"  cy="318" r="11" fill="#3b82f6" opacity="0.85" filter="url(#softGlow)"/>
  <circle cx="155" cy="265" r="11" fill="#5b99f6" opacity="0.85" filter="url(#softGlow)"/>
  <circle cx="265" cy="185" r="13" fill="#0ec47a" opacity="0.9"  filter="url(#softGlow)"/>

  <!-- Punto óptimo — máximo Sharpe -->
  <circle cx="346" cy="92" r="38" fill="rgba(16,185,129,0.12)" stroke="rgba(16,185,129,0.3)" stroke-width="2"/>
  <circle cx="346" cy="92" r="24" fill="rgba(16,185,129,0.2)"  stroke="rgba(16,185,129,0.5)" stroke-width="2"/>
  <circle cx="346" cy="92" r="13" fill="#10b981" filter="url(#glow)"/>

  <!-- Ejes -->
  <line x1="50" y1="320" x2="350" y2="320" stroke="rgba(148,163,184,0.25)" stroke-width="2"/>
  <line x1="50" y1="320" x2="50"  y2="80"  stroke="rgba(148,163,184,0.25)" stroke-width="2"/>

  <!-- Etiquetas de eje -->
  <text x="180" y="350" font-size="22" fill="rgba(148,163,184,0.5)"
    font-family="'JetBrains Mono', monospace" text-anchor="middle" letter-spacing="2">RIESGO →</text>
  <text x="28" y="215" font-size="22" fill="rgba(148,163,184,0.5)"
    font-family="'JetBrains Mono', monospace" text-anchor="middle" letter-spacing="2"
    transform="rotate(-90,28,215)">RENDIMIENTO →</text>
</svg>
